# ==========================================
# TMUX CONFIG - OPTIMIZED & CLEAN
# ==========================================

# --- Prefijo ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Calidad de Vida (Performance) ---
set -g mouse on
set -g history-limit 50000      # 100k era overkill, 50k es fluido y seguro
set -g base-index 1             # Ventanas desde 1
setw -g pane-base-index 1       # Paneles desde 1
set -g renumber-windows on      # Reordenar al cerrar
set -g detach-on-destroy off    # No cerrar tmux al cerrar sesión
set -g escape-time 0            # Cero delay para comandos (clave para Vim)
set -g focus-events on          # Reportar focus a aplicaciones
set -g display-time 1500        # Mensajes de status un poco más largos

# --- Terminal & Colores ---
# Soporte nativo para True Color y decoraciones modernas
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,alacritty:RGB"

# --- Shell ---
# Usar el shell del sistema (más portable)
set -g default-shell "/usr/bin/fish"

# --- Modo Copy (Vim Style) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Atajos Personalizados ---
# Recarga rápida
bind r source-file ~/.tmux.conf \; display-message "⚡ Configuración recargada"

# Splits lógicos usando el path actual
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# Navegación de paneles
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionar paneles (Alt + hjkl)
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# --- Interfaz Visual (Optimized) ---
set -g status-position bottom
set -g status-interval 60     # Actualizar cada minuto (ahorra CPU)
set -g status-left-length 30
set -g status-right-length 150

# Colores y Estilo
set -g status-style "bg=#000000,fg=#c7c7cc"

# Status Left: Sesión
set -g status-left "#[fg=#000000,bg=#64d2ff,bold] #S #[fg=#64d2ff,bg=#000000,nobold]│"

# Status Right: Usuario (Variable interna) + Fecha/Hora
set -g status-right "#[fg=#0a84ff,bg=#000000]#{user} #[fg=#3a3a3c,bg=#000000]│ #[fg=#ffffff,bg=#000000,bold]%Y-%m-%d %H:%M "

# Ventanas
setw -g window-status-style "fg=#8e8e93,bg=#000000"
setw -g window-status-current-style "fg=#ffffff,bg=#0a84ff,bold"
setw -g window-status-activity-style "fg=#64d2ff,bg=#000000,bold"
setw -g window-status-bell-style "fg=#1c1c1e,bg=#ffd60a,bold"
setw -g window-status-separator " "
setw -g window-status-current-format " #I:#W "
setw -g window-status-format "#[fg=#3a3a3c]·#[default] #I:#W "

# Bordes y UI (Paleta Alacritty/macOS)
set -g pane-border-style "fg=#2c2c2e"
set -g pane-active-border-style "fg=#0a84ff"
set -g pane-border-status off
set -g message-style "bg=#0a84ff,fg=#ffffff,bold"
set -g message-command-style "bg=#64d2ff,fg=#1c1c1e,bold"
set -g mode-style "bg=#0a84ff,fg=#ffffff"
set -g display-panes-active-colour "#64d2ff"
set -g display-panes-colour "#3a3a3c"
