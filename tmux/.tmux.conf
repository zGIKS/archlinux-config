# TMUX CONFIG - OPTIMIZED & CLEAN

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Quality of Life (Performance) ---
set -g mouse on
set -g history-limit 50000      # 50k is smooth and safe
set -g base-index 1             # Start windows at 1
setw -g pane-base-index 1       # Start panes at 1
set -g renumber-windows on      # Renumber on close
set -g detach-on-destroy off    # Don't exit tmux on session close
set -g escape-time 0            # Zero delay for commands (key for Vim)
set -g focus-events on          # Report focus to applications
set -g display-time 1500        # Status messages slightly longer

# --- Terminal & Colors ---
# Native support for True Color and modern decorations
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,alacritty:RGB"

# --- Shell ---
# Use system shell (more portable)
set -g default-shell "/usr/bin/fish"

# --- Copy Mode (Vim Style) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Custom Shortcuts ---
# Quick reload
bind r source-file ~/.tmux.conf \; display-message "⚡ Configuration reloaded"

# Logical splits using current path
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (Alt + hjkl)
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# --- Visual Interface (Optimized) ---
set -g status-position bottom
set -g status-interval 60     # Update every minute (saves CPU)
set -g status-left-length 30
set -g status-right-length 150

# Colors and Style
set -g status-style "bg=#000000,fg=#c7c7cc"

# Status Left: Session
set -g status-left "#[fg=#000000,bg=#64d2ff,bold] #S #[fg=#64d2ff,bg=#000000,nobold]│"

# Status Right: User (Internal variable) + Date/Time
set -g status-right "#[fg=#0a84ff,bg=#000000]#{user} #[fg=#3a3a3c,bg=#000000]│ #[fg=#ffffff,bg=#000000,bold]%Y-%m-%d %H:%M "

# Windows
setw -g window-status-style "fg=#8e8e93,bg=#000000"
setw -g window-status-current-style "fg=#ffffff,bg=#0a84ff,bold"
setw -g window-status-activity-style "fg=#64d2ff,bg=#000000,bold"
setw -g window-status-bell-style "fg=#1c1c1e,bg=#ffd60a,bold"
setw -g window-status-separator " "
setw -g window-status-current-format " #I:#W "
setw -g window-status-format "#[fg=#3a3a3c]·#[default] #I:#W "

# Borders and UI (Alacritty/macOS palette)
set -g pane-border-style "fg=#2c2c2e"
set -g pane-active-border-style "fg=#0a84ff"
set -g pane-border-status off
set -g message-style "bg=#0a84ff,fg=#ffffff,bold"
set -g message-command-style "bg=#64d2ff,fg=#1c1c1e,bold"
set -g mode-style "bg=#0a84ff,fg=#ffffff"
set -g display-panes-active-colour "#64d2ff"
set -g display-panes-colour "#3a3a3c"
