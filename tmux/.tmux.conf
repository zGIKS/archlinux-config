# Prefix mas comodo (Ctrl+a) y reenvio del prefijo original.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Calidad de vida.
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 0
set -g focus-events on

# Mejor compatibilidad de color en terminales modernas.
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-features ",alacritty*:RGB"

# Usar fish dentro de tmux (igual que Alacritty).
set -g default-shell "/usr/bin/fish"
set -g default-command "/usr/bin/fish -l"

# Modo copy con atajos tipo vim.
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Recarga rapida de configuracion.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf recargado"

# Splits usando el directorio actual del panel.
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# Navegacion de paneles (prefijo + h/j/k/l).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionar paneles con Alt + hjkl (sin prefijo).
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# Estado simple y legible.
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 80
set -g status-style "bg=#000000,fg=#c7c7cc"
set -g status-left "#[fg=#000000,bg=#64d2ff,bold] #S #[fg=#64d2ff,bg=#000000,nobold]│"
set -g status-right "#[fg=#0a84ff,bg=#000000]#(whoami) #[fg=#3a3a3c,bg=#000000]│ #[fg=#ffffff,bg=#000000,bold]%Y-%m-%d %H:%M "

setw -g window-status-style "fg=#8e8e93,bg=#000000"
setw -g window-status-current-style "fg=#ffffff,bg=#0a84ff,bold"
setw -g window-status-activity-style "fg=#64d2ff,bg=#000000,bold"
setw -g window-status-bell-style "fg=#1c1c1e,bg=#ffd60a,bold"
setw -g window-status-separator " "
setw -g window-status-current-format " #I:#W "
setw -g window-status-format "#[fg=#3a3a3c]·#[default] #I:#W "

# Bordes y UI alineados con la paleta de Alacritty (azules/cyan macOS).
set -g pane-border-style "fg=#2c2c2e"
set -g pane-active-border-style "fg=#0a84ff"
set -g pane-border-status off
set -g message-style "bg=#0a84ff,fg=#ffffff,bold"
set -g message-command-style "bg=#64d2ff,fg=#1c1c1e,bold"
set -g mode-style "bg=#0a84ff,fg=#ffffff"
set -g display-panes-active-colour "#64d2ff"
set -g display-panes-colour "#3a3a3c"

# Permite recargar y limpiar visualmente.
bind C-l send-keys C-l
