[mgr]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = false
show_symlink = true
scrolloff = 5

[preview]
preview_protocol = "sixel"
tab_size = 2
max_width = 800
max_height = 600
image_filter = "triangle"  # Much faster than lanczos3
image_quality = 50        # Sufficient for terminal preview
sixel_fraction = 12       # Balanced Sixel rendering

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$1"', orphan = true, desc = "Open" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', orphan = true, desc = "Reveal" },
]

[open]
prepend_rules = [
  { name = "*.md", use = "edit" },
  { mime = "text/*", use = "edit" },
]
